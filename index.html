<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiara - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
   
    
    <section class="profile-section">
      <div class="avatar-wrapper">
        <img src="IMG_7140.jpg" alt="Chiara" class="avatar">
        <div class="avatar-glow"></div>
      </div>
      <h1>Chiara</h1>
      <p class="role">IESEG Student</p>
      <p class="location">Lille, France</p>
    </section>

    
    <section class="passions-section">
      <h2>🔥 My Passions</h2>
      <div class="passions-grid">
        <div class="passion-item">
          <div class="passion-icon">🎨</div>
          <h3>Photography</h3>
          <p>Make beautiful pictures</p>
        </div>
        <div class="passion-item">
          <div class="passion-icon">💻</div>
          <h3>Music</h3>
          <p>Listen music all the day</p>
        </div>
        <div class="passion-item">
          <div class="passion-icon">🧑‍🍳</div>
          <h3>Cooking</h3>
          <p>Make delicious dishes for my family</p>
        </div>
      </div>
    </section>

    
    <section class="objectifs-section">
      <h2>🎯 Goals</h2>
      <ul>
        <li>Do a half-marathon</li>
        <li>Have a cat</li>
        <li>Find a job</li>
        <li>Graduate</li>
      </ul>
    </section>

    
    <section class="social-section">
      <h2>📱 Follow me</h2>
      <div class="social-buttons">
        <a href="#" class="social-btn linkedin">
          <span>LinkedIn</span>
        </a>
        <a href="#" class="social-btn github">
          <span>GitHub</span>
        </a>
        <a href="#" class="social-btn instagram">
          <span>Instagram</span>
        </a>
      </div>
    </section>

  </div>
</body>
</html>
